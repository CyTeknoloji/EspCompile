name: ESP32 Bulut Derleyici

on:
  workflow_dispatch:
    inputs:
      sketch_code:
        description: 'Arduino/ESP32 Kodu'
        required: true
      libraries:
        description: 'Kütüphaneler (Virgülle ayırın)'
        required: false
      library_files:
        description: 'Uygulamadan zip kütüphaneler (JSON)'
        required: false
      board_type:
        description: 'Kart Modeli (FQBN)'
        required: true
        default: 'esp32:esp32:esp32'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Arduino CLI Kur
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: ESP32 Çekirdek ve Kütüphane Önbelleği
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: ${{ runner.os }}-arduino-esp32-v4

      - name: ESP32 Çekirdek Kurulumu
        run: |
          ./bin/arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          ./bin/arduino-cli core install esp32:esp32@3.1.1 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Kütüphaneleri Kur
        shell: bash
        env:
          LIBS: ${{ github.event.inputs.libraries }}
          SKETCH_CODE: ${{ github.event.inputs.sketch_code }}
        run: |
          set -euo pipefail
          CLI=./bin/arduino-cli

          install_named() {
            local name="$1"
            [ -z "$name" ] && return 0
            echo "--- Kuruluyor: $name ---"
            if $CLI lib install "$name"; then
              echo "$name kuruldu."
              return 0
            fi
            echo "UYARI: $name Library Manager'da bulunamadi."
            return 1
          }

          install_esp32_audio_i2s() {
            echo "=== ESP32-audioI2S (Audio.h) kurulumu ==="
            for name in "ESP32-audioI2S" "ESP32-audioI2S-master"; do
              if install_named "$name"; then
                return 0
              fi
            done
            echo "Registry basarisiz, GitHub'dan klonlaniyor..."
            $CLI lib install --git-url https://github.com/schreibfaul1/ESP32-audioI2S.git
          }

          install_mapped() {
            local key="${1,,}"
            case "$key" in
              *dht*) install_named "DHT sensor library"; install_named "Adafruit Unified Sensor" ;;
              *esp8266audio*|*audiogenerator*) install_named "ESP8266Audio" ;;
              *audio*|*esp32-audio*) install_esp32_audio_i2s ;;
              *geolinker*) install_named "GeoLinker"; install_named "ArduinoJson" ;;
              *adafruit_gfx*) install_named "Adafruit GFX Library"; install_named "Adafruit BusIO" ;;
              *adafruit_ssd1306*) install_named "Adafruit SSD1306" ;;
              *arduinojson*) install_named "ArduinoJson" ;;
              *ntpclient*) install_named "NTPClient" ;;
              *universaltelegrambot*) install_named "Universal Telegram Bot Library"; install_named "ArduinoJson" ;;
              *blynk*) install_named "Blynk" ;;
              *sinric*) install_named "SinricPro" ;;
              *esp_mail*) install_named "ESP Mail Client" ;;
              *espasyncwebserver*) install_named "ESP Async WebServer"; install_named "AsyncTCP" ;;
              *asynctcp*) install_named "AsyncTCP" ;;
              *tinygps*) install_named "TinyGPSPlus" ;;
              *bluetoothserial*) echo "BluetoothSerial: ESP32 cekirdegi icinde" ;;
              *softwareserial*) install_named "EspSoftwareSerial" ;;
              *pwmservo*|*adafruit_pwm*) install_named "Adafruit PWM Servo Driver Library"; install_named "Adafruit BusIO" ;;
              *ds1302*) install_named "DS1302" ;;
              *servo*|*varspeed*) install_named "Servo" ;;
              *stepper*) install_named "Stepper" ;;
              *mfrc*) install_named "MFRC522" ;;
              *liquidcrystal*) install_named "LiquidCrystal I2C" ;;
              *onewire*) install_named "OneWire" ;;
              *irremote*) install_named "IRremote" ;;
              *keypad*) install_named "Keypad" ;;
              *hx711*) install_named "HX711 Arduino Library" ;;
              *accel*) install_named "AccelStepper" ;;
              *pubsub*) install_named "PubSubClient" ;;
              *pulse*) install_named "PulseSensor Playground" ;;
              *touchscreen*) install_named "TouchScreen" ;;
              *adafruit_pcd*) install_named "Adafruit PCD8544"; install_named "Adafruit BusIO" ;;
              *adafruit_tcs*) install_named "Adafruit TCS34725" ;;
              *adafruit_mlx*) install_named "Adafruit MLX90614 Library"; install_named "Adafruit BusIO" ;;
              *adafruit_neo*) install_named "Adafruit NeoPixel" ;;
              *)
                install_named "$1" || true
                ;;
            esac
          }

          needs_audio=false
          if echo "$SKETCH_CODE" | grep -qiE '#include\s*[<"][^">]*Audio\.h[>"]'; then
            needs_audio=true
            echo "Sketch Audio.h iceriyor -> ESP32-audioI2S zorunlu."
            install_esp32_audio_i2s
          fi

          echo "Uygulamadan gelen kutuphane listesi: [${LIBS:-bos}]"

          if [ -n "${LIBS:-}" ]; then
            echo "$LIBS" | tr ',' '\n' | while IFS= read -r lib; do
              trim_lib=$(echo "$lib" | xargs)
              [ -z "$trim_lib" ] && continue
              if [ "$needs_audio" = true ] && echo "${trim_lib,,}" | grep -q audio; then
                continue
              fi
              install_mapped "$trim_lib"
            done
          fi

      - name: Uygulamadan gelen kütüphane zip dosyaları
        env:
          LIBRARY_FILES: ${{ github.event.inputs.library_files }}
        run: |
          python3 scripts/install_library_files.py

      - name: Sketch Hazırla (Python ile Tırnak Koruması)
        shell: python
        env:
          SKETCH_INPUT: ${{ github.event.inputs.sketch_code }}
        run: |
          import os
          content = os.environ.get('SKETCH_INPUT', '')
          os.makedirs('MySketch', exist_ok=True)
          with open('MySketch/MySketch.ino', 'w', encoding='utf-8') as f:
              f.write(content)

      - name: Derle ve Parçaları Oluştur
        run: |
          mkdir -p output
          ./bin/arduino-cli compile --fqbn ${{ github.event.inputs.board_type }} --build-property build.flash_mode=dio MySketch --output-dir ./output

      - name: Binary Dosyalarını Paketle
        run: |
          zip -j esp32_builds.zip output/*.bin

      - name: Artifact Olarak Yayınla
        uses: actions/upload-artifact@v4
        with:
          name: esp32_artifacts
          path: esp32_builds.zip
